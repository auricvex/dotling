name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Determine binary name
        id: bin
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            echo "name=dotling.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=dotling" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Determine archive name
        id: archive
        run: |
          target="${{ matrix.target }}"
          case "$target" in
            x86_64-unknown-linux-gnu)     slug="x86_64-linux"         ;;
            x86_64-unknown-linux-musl)    slug="x86_64-linux-musl"    ;;
            aarch64-unknown-linux-gnu)    slug="aarch64-linux"        ;;
            x86_64-apple-darwin)          slug="x86_64-macos"         ;;
            aarch64-apple-darwin)         slug="aarch64-macos"        ;;
            x86_64-pc-windows-msvc)       slug="x86_64-windows"       ;;
            aarch64-pc-windows-msvc)      slug="aarch64-windows"      ;;
          esac
          echo "name=dotling-${slug}.${{ matrix.archive }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ steps.archive.outputs.name }} ${{ steps.bin.outputs.name }}
        shell: bash

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ steps.archive.outputs.name }} ${{ steps.bin.outputs.name }}
        shell: bash

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ steps.archive.outputs.name }} > ${{ steps.archive.outputs.name }}.sha256
          else
            shasum -a 256 ${{ steps.archive.outputs.name }} > ${{ steps.archive.outputs.name }}.sha256
          fi
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.archive.outputs.name }}
            ${{ steps.archive.outputs.name }}.sha256

  update-tap:
    name: Update homebrew-dotling tap
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Derive version from tag
        id: meta
        run: |
          # tag is e.g. v0.4.0 → version is 0.4.0
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute SHA256
        id: sha
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="https://github.com/auricvex/dotling/releases/download/${TAG}"
          sha_for() {
            local url="$1"
            # Follow redirects; fail fast on HTTP errors
            curl -fsSL "$url" | sha256sum | awk '{print $1}'
          }

          echo "Fetching checksums for ${TAG}…"
          SHA_AARCH64_MACOS=$(sha_for "${BASE}/dotling-aarch64-macos.tar.gz")
          SHA_X86_64_MACOS=$(sha_for  "${BASE}/dotling-x86_64-macos.tar.gz")
          SHA_AARCH64_LINUX=$(sha_for "${BASE}/dotling-aarch64-linux.tar.gz")
          SHA_X86_64_LINUX=$(sha_for  "${BASE}/dotling-x86_64-linux.tar.gz")

          echo "aarch64_macos=${SHA_AARCH64_MACOS}"  >> "$GITHUB_OUTPUT"
          echo "x86_64_macos=${SHA_X86_64_MACOS}"    >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=${SHA_AARCH64_LINUX}"  >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=${SHA_X86_64_LINUX}"    >> "$GITHUB_OUTPUT"

      - name: Render formula
        id: formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG:     ${{ steps.meta.outputs.tag }}
          SHA_AARCH64_MACOS: ${{ steps.sha.outputs.aarch64_macos }}
          SHA_X86_64_MACOS:  ${{ steps.sha.outputs.x86_64_macos }}
          SHA_AARCH64_LINUX: ${{ steps.sha.outputs.aarch64_linux }}
          SHA_X86_64_LINUX:  ${{ steps.sha.outputs.x86_64_linux }}
        run: |
          BASE="https://github.com/auricvex/dotling/releases/download/${TAG}"
          cat > dotling.rb <<FORMULA
          class Dotling < Formula
            desc "A Rust-based dotfiles manager"
            homepage "https://github.com/auricvex/dotling"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/dotling-aarch64-macos.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              else
                url "${BASE}/dotling-x86_64-macos.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/dotling-aarch64-linux.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "${BASE}/dotling-x86_64-linux.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "dotling"
            end

            test do
              system "\#{bin}/dotling", "--version"
            end
          end
          FORMULA

          # Strip the leading indentation introduced by the heredoc
          sed -i 's/^  //' dotling.rb

          echo "--- Generated formula ---"
          cat dotling.rb

      - name: Push formula to homebrew-dotling
        env:
          TAG:     ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          REPO="auricvex/homebrew-dotling"
          FILE_PATH="Formula/dotling.rb"
          API="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}"

          # Fetch the current file's SHA (needed by the GitHub Contents API to update)
          CURRENT_SHA=$(curl -fsSL \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          # Base64-encode the rendered formula
          CONTENT_B64=$(base64 -w 0 < dotling.rb)

          # Commit the new formula
          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "${API}" \
            -d "{
              \"message\": \"chore: update formula to ${VERSION}\",
              \"content\": \"${CONTENT_B64}\",
              \"sha\": \"${CURRENT_SHA}\"
            }"

          echo "✓ Formula pushed to ${REPO} for ${TAG}"
